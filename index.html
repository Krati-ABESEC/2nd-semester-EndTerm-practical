<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odd/Even Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> Odd/Even Checker </h1>
        <input type="number" placeholder=" enter a number " id="text">
        <br>
        <div class="box">
            <button id="check"> Check Number </button>
            <button id="reset"> Reset</button>
        </div>
        <br>
        <div id="result"></div>
    </div>
    <script src="index.js"></script>
</body>
</html>
